<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #fff;
    }
    h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 12px;
      color: #666;
      margin-bottom: 20px;
      text-align: center;
      line-height: 1.4;
    }
    button {
      font-size: 13px;
      font-weight: 500;
      padding: 8px 24px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    #import-btn {
      background: #18a0fb;
      color: #fff;
    }
    #import-btn:hover { background: #0d8de6; }
    #import-btn:disabled {
      background: #b0b0b0;
      cursor: not-allowed;
    }
    #cancel-btn {
      background: transparent;
      color: #666;
      margin-top: 8px;
    }
    #cancel-btn:hover { color: #333; }
    #status {
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      min-height: 16px;
    }
    .error { color: #e03e3e; }
    .success { color: #2ea043; }
    .loading { color: #666; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #ccc;
      border-top-color: #18a0fb;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h2>Moodboard Importer</h2>
  <p>Fetch grouped images from the local server and insert them into FigJam.</p>
  <button id="import-btn" onclick="importData()">Import Moodboard</button>
  <button id="cancel-btn" onclick="parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*')">Cancel</button>
  <div id="status"></div>

  <script>
    const statusEl = document.getElementById('status');
    const importBtn = document.getElementById('import-btn');

    async function importData() {
      importBtn.disabled = true;
      statusEl.className = 'loading';
      statusEl.innerHTML = '<span class="spinner"></span>Fetching data from server...';

      try {
        const res = await fetch('http://localhost:3000/data');
        if (!res.ok) {
          throw new Error('Server returned ' + res.status);
        }
        const data = await res.json();

        if (!data.groups || data.groups.length === 0) {
          statusEl.className = 'error';
          statusEl.textContent = 'No image groups found in server data.';
          importBtn.disabled = false;
          return;
        }

        const totalImages = data.groups.reduce((sum, g) => sum + (g.images ? g.images.length : 0), 0);
        statusEl.className = 'loading';
        statusEl.innerHTML = '<span class="spinner"></span>Importing ' + totalImages + ' images...';

        parent.postMessage({ pluginMessage: { type: 'import', data: data } }, '*');
      } catch (err) {
        statusEl.className = 'error';
        if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
          statusEl.textContent = 'Cannot reach server. Make sure the skill is running on localhost:3000.';
        } else {
          statusEl.textContent = 'Error: ' + err.message;
        }
        importBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
